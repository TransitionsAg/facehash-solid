when:
  event: tag

steps:
  publish:
    image: nixos/nix:latest
    user: root
    environment:
      NIX_CONFIG: "experimental-features = nix-command flakes"
      JSR_TOKEN:
        from_secret: JSR_TOKEN
    commands:
      - nix develop .#ci --command test -n "$CI_COMMIT_TAG"
      - nix develop .#ci --command test -n "$CI_COMMIT_SHA"
      - nix develop .#ci --command test -n "$JSR_TOKEN"
      - |
          nix develop .#ci --command sh -c 'echo "$CI_COMMIT_TAG" | grep -Eq "^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*))?$" || { echo "Tag must be semver like v1.2.3 or v1.2.3-rc.1"; exit 1; }'
      - nix develop .#ci --command git fetch origin +refs/heads/main:refs/remotes/origin/main +refs/tags/*:refs/tags/*
      - nix develop .#ci --command git merge-base --is-ancestor "$CI_COMMIT_SHA" origin/main
      - VERSION="${CI_COMMIT_TAG#v}" nix develop .#ci --command deno eval 'const version = Deno.env.get("VERSION"); const json = JSON.parse(await Deno.readTextFile("deno.json")); json.version = version; await Deno.writeTextFile("deno.json", JSON.stringify(json, null, 2) + "\n");'
      - nix develop .#ci --command deno fmt deno.json
      - nix develop .#ci --command deno fmt --check
      - nix develop .#ci --command deno lint
      - nix develop .#ci --command deno task check
      - nix develop .#ci --command deno publish --dry-run --allow-dirty
      - nix develop .#ci --command deno publish --allow-dirty --token "$JSR_TOKEN"
